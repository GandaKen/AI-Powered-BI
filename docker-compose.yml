services:
  ollama:
    image: ollama/ollama:latest
    container_name: insightforge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    container_name: insightforge-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull llama3.1:8b && ollama pull llama3.2:3b && ollama pull nomic-embed-text"
    environment:
      - OLLAMA_HOST=http://ollama:11434

  bifrost:
    image: maximhq/bifrost:latest
    container_name: insightforge-bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost/config.json:/app/config/config.json:ro
    depends_on:
      - ollama

  redis:
    image: redis:7-alpine
    container_name: insightforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: insightforge-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=insightforge
      - POSTGRES_PASSWORD=insightforge
      - POSTGRES_DB=insightforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightforge-app
    ports:
      - "8501:8501"
    environment:
      - BIFROST_BASE_URL=http://bifrost:8080
      - LLM_MODEL_LIGHT=llama3.2:3b
      - LLM_MODEL_HEAVY=llama3.1:8b
      - EMBEDDING_MODEL=nomic-embed-text
      - RAG_TOP_K=5
      - MAX_EVAL_RETRIES=1
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://insightforge:insightforge@postgres:5432/insightforge
    depends_on:
      bifrost:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  ollama_data:
  redis_data:
  postgres_data:

