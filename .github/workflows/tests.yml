name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=insightforge --cov-report=term-missing --cov-fail-under=0

      - name: Type check
        run: |
          mypy insightforge/ --ignore-missing-imports || true

